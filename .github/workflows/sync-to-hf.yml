name: Sync to Hugging Face Spaces
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Setup Git LFS and migrate weights
        run: |
          git lfs install
          git lfs migrate import --include="*.pt" --everything --yes
      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://adityas-31:$HF_TOKEN@huggingface.co/spaces/adityas-31/adi-gpt main
